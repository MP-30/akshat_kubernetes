apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition

metadata:
  name: flipkartapplications.flipkart.com

spec:
  group: flipkart.com

  scope: Namespaced

  names:
    plural: flipkartapplications
    singular: flipkartapplication
    kind: FlipkartApplication
    shortNames:
    - fapp

  versions:
  - name: v1
    served: true
    storage: true

    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              image:
                type: string

              replicas:
                type: integer

              minReplicas:
                type: integer

              maxReplicas:
                type: integer

            required:
            - image
            - replicas
            - minReplicas
            - maxReplicas
